<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Jogo da Forca</h1>

        <div id="palavra" class="palavra"></div>

        <p>
            Tentativas restantes:
            <span id="tentativas">6</span>
        </p>

        <p>
            Letras utilizadas:
            <span id="usadas"></span>
        </p>

        <form id="form">
            <input
                type="text"
                id="letra"
                maxlength="1"
                required
                autofocus
            >
            <button type="submit">Tentar</button>
        </form>

        <div id="mensagem"></div>

        <button id="reiniciar" style="display:none;">
            Novo Jogo
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
